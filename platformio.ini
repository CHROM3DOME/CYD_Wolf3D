[platformio]
default_envs = cyd_wolf3d

[env:cyd_esp32]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bodmer/TJpg_Decoder@^1.1.0
build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D USE_HSPI_PORT=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=16000000

[env:cyd_wolf3d]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
build_src_filter =
  -<*>
  +<wolf3d/**>
build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D USE_HSPI_PORT=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=16000000
  -D VERSIONALREADYCHOSEN
  -D CARMACIZED
  -D GOODTIMES
  -D WOLF3D_CYD_PORT
  -D CYD_WOLF_VIEW_SIZE=20
  -D CYD_WOLF_SKIP_BOOT_SCREENS=1
  -D CYD_WOLF_DRAW_SPRITES=1
  -D CYD_WOLF_DRAW_WEAPON=1
  -D CYD_WOLF_DRAW_STATUSBAR_ART=0
  -D CYD_WOLF_FLAT_WALLS=1
  -D CYD_WOLF_WALL_TEXTURE_CACHE=1
  -D CYD_WOLF_WALL_TEXTURE_MIN_PIC=0
  -D CYD_WOLF_FAST_SPRITES=1
  -D CYD_WOLF_FAST_SPRITE_MIN_HEIGHT=32
  -D CYD_WOLF_FAST_DECOR_SPRITE_MIN_HEIGHT=32
  -D CYD_WOLF_HIDE_TINY_DECOR_SPRITES=1
  -D CYD_WOLF_TINY_DECOR_MAX_HEIGHT=14
  -D CYD_WOLF_DRAW_STATIC_DECOR=1
  -D CYD_WOLF_MAX_STATIC_DECOR_SPRITES=8
  -D CYD_WOLF_STATIC_DECOR_IMPOSTORS=1
  -D CYD_WOLF_STATIC_DECOR_CACHE=1
  -D CYD_WOLF_DECOR_OCCLUSION_MARGIN=16
  -D CYD_WOLF_SPRITE_BUDGET_US=0
  -D CYD_WOLF_ENABLE_FRAME_HEARTBEAT=0
  -Wl,-Map=.pio/build/cyd_wolf3d/firmware.map
  -Wno-unused-variable
  -Wno-unused-function
  -Wno-write-strings

[env:cyd_wolf3d_wl1]
extends = env:cyd_wolf3d
build_flags =
  ${env:cyd_wolf3d.build_flags}
  -D UPLOAD
